# ---------------------------------------------------------------------------
# Graph-based authorization analysis (optional)
# ---------------------------------------------------------------------------
# Runs after standard detection to find cross-endpoint authorization
# inconsistencies that request-pair detectors miss:
#   - child-resource exposure  (parent denied, child allowed)
#   - hidden privilege paths   (admin sub-action reachable when main is denied)
#   - sibling action gaps      (denied on one action, allowed on another in same family)
#   - ownership inconsistencies (response body shows resource belongs to someone else)
#   - tenant boundary violations (different tenant IDs seen for the same resource)
#   - partial authorization     (some endpoints in a family protected, others not)
#
# Enable by setting enabled: true. All sub-options default to true.
#
# graph_analysis:
#   enabled: true
#
#   # Use owner_id / user_id / created_by fields in response bodies to infer ownership
#   infer_ownership: true
#
#   # Detect tenant boundary violations via tenant_id / organization_id fields
#   infer_tenant_boundaries: true
#
#   # Check for admin sub-endpoints reachable when the main admin endpoint is denied
#   enable_hidden_privilege_path_checks: true
#
#   # Minimum confidence for graph findings to appear in output
#   # Options: low (all findings), medium (confirmed + potential), high (confirmed only)
#   min_confidence: low
