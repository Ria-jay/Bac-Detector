# BAC Detector — Sample Configuration
# For authorized security testing only.
# Copy this file, fill in your target and identity tokens, and run:
#   bacdet scan --config config.yaml

target:
  # Base URL of the application under test
  base_url: "http://127.0.0.1:8888"

  # Optional: separate API base if different from the web app base
  # api_base_url: "https://api.example.com/v1"

  # Option 1: Provide an OpenAPI/Swagger spec URL or local file path
  # openapi_url: "https://api.example.com/openapi.json"
  # openapi_url: "./specs/openapi.json"

  # Option 2: Provide a plain-text file of endpoints (one per line)
  endpoint_list_path: "./example/endpoints.txt"

  # Optional: restrict testing to these URL prefixes only
  # scope_allowlist:
  #   - "/api/v1/"
  #   - "/api/v2/"

